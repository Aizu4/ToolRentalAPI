services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-tool_rental}
      POSTGRES_USER: ${DB_USER:-tool_rental}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tool_rental} -d ${DB_NAME:-tool_rental}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-tool_rental}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-tool_rental}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secret}
      APP_JWT_SECRET: ${JWT_SECRET:-tool-rental-super-secret-key-must-be-at-least-32-chars}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
